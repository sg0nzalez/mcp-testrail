name: E2E Test

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "lts/*"
          cache: false

      - uses: flatt-security/setup-takumi-guard-npm@9a5d797c2085b6326d3a2985c08e3a114b9b88c1 # v1
        with:
          bot-id: "BT01KPGC0DQQM4GSQJXHGAJ7C87G"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build
        run: npm run build

      - name: Setup TestRail API key
        uses: anthropics/claude-code-action@51705da45eecce209d4700538bf8377d5b5fc695 # v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          show_full_output: true
          prompt: "/e2e-setup"
          claude_args: |
            --model claude-sonnet-4-6
            --max-turns 100

      - name: Run E2E tests
        uses: anthropics/claude-code-action@51705da45eecce209d4700538bf8377d5b5fc695 # v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          show_full_output: true
          prompt: "/e2e-test"
          claude_args: |
            --model claude-sonnet-4-6
            --max-turns 100
