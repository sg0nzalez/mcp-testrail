name: Muninn Security Scan

on:
  pull_request:
  push:
    branches: [main]

jobs:
  muninn:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      pull-requests: write

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Run Muninn
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          docker run --rm \
            -v "${GITHUB_WORKSPACE}:/github/workspace" \
            -v "${GITHUB_EVENT_PATH}:${GITHUB_EVENT_PATH}:ro" \
            -w /github/workspace \
            -e GITHUB_TOKEN \
            -e GITHUB_EVENT_NAME \
            -e GITHUB_EVENT_PATH \
            -e GITHUB_REPOSITORY \
            -e GITHUB_API_URL \
            -e FAIL_ON=info \
            -e CONFIG_PATH=muninn.yml \
            -e OUTPUT_FORMATS=sarif,comment \
            -e OUTPUT_PATH=muninn.sarif \
            -e JSON_PATH=muninn.json \
            -e SCAN_TARGET=. \
            ghcr.io/skaldlab/muninn:0.3.3

      - name: Upload SARIF
        if: always() && hashFiles('muninn.sarif') != ''
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          sarif_file: muninn.sarif
